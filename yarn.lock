import { useState } from "react";
import { motion } from "framer-motion";
import { Mail, Phone, MapPin, Truck, MessageCircle, Send } from "lucide-react";
import { toast } from "sonner";
import { api, formatApiErrorDetail } from "../lib/api";
import { useStore } from "../context/StoreContext";
import { buildWhatsAppLink } from "../lib/whatsapp";

export default function Contact() {
  const { settings } = useStore();
  const [form, setForm] = useState({ name: "", email: "", phone: "", message: "" });
  const [submitting, setSubmitting] = useState(false);

  const waLink = buildWhatsAppLink(settings.whatsapp_number, "Hi Yadav PC Wala! I have a question about your gaming PCs.");

  const handleChange = (e) => setForm((f) => ({ ...f, [e.target.name]: e.target.value }));

  const handleSubmit = async (e) => {
    e.preventDefault();
    setSubmitting(true);
    try {
      const { data } = await api.post("/contact", form);
      toast.success(data.message || "Inquiry sent successfully!");
      setForm({ name: "", email: "", phone: "", message: "" });
    } catch (err) {
      toast.error(formatApiErrorDetail(err.response?.data?.detail) || "Failed to send. Try WhatsApp instead.");
    } finally {
      setSubmitting(false);
    }
  };

  const info = [
    { icon: Phone, label: "Phone", value: settings.phone },
    { icon: Mail, label: "Email", value: settings.email },
    { icon: MapPin, label: "Address", value: settings.address },
    { icon: Truck, label: "Delivery", value: settings.city },
  ];

  return (
    <div data-testid="contact-page">
      <section className="border-b border-white/10 py-20 relative overflow-hidden">
        <div className="absolute inset-0 grid-bg opacity-30" />
        <div className="relative max-w-7xl mx-auto px-6 lg:px-8">
          <span className="overline">Get In Touch</span>
          <h1 className="font-heading font-black uppercase text-4xl lg:text-6xl tracking-tighter mt-4">Contact Us</h1>
          <p className="text-zinc-400 mt-4 max-w-xl">
            Have a question or want a custom build? Drop us a message or chat instantly on WhatsApp.
          </p>
        </div>
      </section>

      <section className="py-20">
        <div className="max-w-7xl mx-auto px-6 lg:px-8 grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16">
          {/* Form */}
          <motion.form
            initial={{ opacity: 0, y: 20 }}
            whileInView={{ opacity: 1, y: 0 }}
            viewport={{ once: true }}
            onSubmit={handleSubmit}
            className="bg-surface border border-white/10 p-8"
            data-testid="contact-form"
          >
            <h2 className="font-heading font-bold uppercase text-2xl mb-6">Send a Message</h2>
            <div className="space-y-5">
              {[
                { name: "name", label: "Your Name", type: "text", required: true },
                { name: "email", label: "Email", type: "email", required: true },
                { name: "phone", label: "Phone / WhatsApp", type: "text", required: false },
              ].map((f) => (
                <div key={f.name}>
                  <label className="block text-xs uppercase tracking-widest text-zinc-500 mb-2">{f.label}</label>
                  <input
                    type={f.type}
                    name={f.name}
                    required={f.required}
                    value={form[f.name]}
                    onChange={handleChange}
                    data-testid={`contact-${f.name}`}
                    className="w-full bg-black border border-white/15 px-4 py-3 text-white font-mono text-sm focus:border-neon-cyan focus:outline-none transition-colors"
                  />
                </div>
              ))}
              <div>
                <label className="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Message</label>
                <textarea
                  name="message"
                  required
                  rows={4}
                  value={form.message}
                  onChange={handleChange}
                  data-testid="contact-message"
                  className="w-full bg-black border border-white/15 px-4 py-3 text-white font-mono text-sm focus:border-neon-cyan focus:outline-none transition-colors resize-none"
                />
              </div>
              <button type="submit" disabled={submitting} data-testid="contact-submit" className="btn-primary w-full">
                {submitting ? "Sending..." : (<><Send className="w-4 h-4" /> Send Message</>)}
              </button>
            </div>
          </motion.form>

          {/* Info */}
          <div>
            <motion.div
              initial={{ opacity: 0, y: 20 }}
              whileInView={{ opacity: 1, y: 0 }}
              viewport={{ once: true }}
              className="grid grid-cols-1 sm:grid-cols-2 border-t border-l border-white/10"
            >
              {info.map((i) => (
                <div key={i.label} className="border-b border-r border-white/10 p-7" data-testid={`contact-info-${i.label.toLowerCase()}`}>
                  <i.icon className="w-7 h-7 text-neon-cyan" strokeWidth={1.6} />
                  <p className="text-xs uppercase tracking-widest text-zinc-500 mt-4">{i.label}</p>
                  <p className="text-white mt-1 break-words">{i.value}</p>
                </div>
              ))}
            </motion.div>

            <div className="mt-8 bg-whatsapp/10 border border-whatsapp/30 p-8">
              <MessageCircle className="w-9 h-9 text-whatsapp" />
              <h3 className="font-heading font-bold uppercase text-xl mt-4">Prefer WhatsApp?</h3>
              <p className="text-zinc-400 text-sm mt-2">
                Get instant replies. Tap below to chat with our build experts right now.
              </p>
              <a href={waLink} target="_blank" rel="noopener noreferrer" data-testid="contact-whatsapp-btn" className="btn-whatsapp mt-6">
                <MessageCircle className="w-5 h-5" /> Chat on WhatsApp
              </a>
            </div>
          </div>
        </div>
      </section>
    </div>
  );
}
